version: '3.8'

services:
  # Service PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: info_guerre_db
    environment:
      POSTGRES_DB: informations_guerre
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      # Montrer les scripts SQL pour initialisation
      - ./database/script.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql
      # Volume de persistance des données
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service PHP/Apache
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: info_guerre_app
    ports:
      - "80:80"
    volumes:
      # Montrer le code source en direct (pour développement)
      - .:/var/www/html
      - ./public/uploads:/var/www/html/public/uploads
    environment:
      - DB_HOST=postgres
      - DB_NAME=informations_guerre
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
