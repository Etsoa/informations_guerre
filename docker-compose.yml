version: "3.8"

services:
  # ========================
  # PostgreSQL
  # ========================
  db:
    image: postgres:16-alpine
    container_name: ig_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-informations_guerre}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/script.sql:/docker-entrypoint-initdb.d/script.sql:ro
      - ./database/data.sql:/docker-entrypoint-initdb.d/data.sql:ro
    networks:
      - app-network

  # ========================
  # Backend API (Node.js + Express)
  # ========================
  api:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: ig_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-informations_guerre}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - app-network

  # ========================
  # Frontend (React + Apache)
  # ========================
  frontend:
    build:
      context: ./frontoffice
      dockerfile: Dockerfile
    container_name: ig_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network

volumes:
  pg_data:

networks:
  app-network:
    driver: bridge
